<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Laser Tag - Tactical Radar Update</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #020202; 
            font-family: 'Courier New', Courier, monospace; 
            user-select: none;
        }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: #0ff; 
            font-size: 28px; 
            font-weight: bold;
            text-shadow: 0 0 10px #0ff; 
            z-index: 10; 
            pointer-events: none;
        }
        #crosshair { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            width: 20px; 
            height: 20px; 
            border: 3px solid #0ff; 
            border-radius: 50%; 
            transform: translate(-50%, -50%); 
            pointer-events: none; 
            box-shadow: 0 0 10px #0ff, inset 0 0 5px #0ff; 
            z-index: 10;
        }
        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 4px; height: 4px;
            background: #0ff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            background: rgba(0, 15, 15, 0.85);
            border: 2px solid #0ff;
            border-radius: 50%; /* Сделаем круглым для стиля */
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }
        #instructions { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: rgba(0, 0, 0, 0.9); 
            color: #0ff; 
            z-index: 20; 
        }
        .diff-btns {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .menu-btn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            background-color: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            border-radius: 5px;
            cursor: pointer;
            text-shadow: 0 0 10px #0ff;
            box-shadow: 0 0 10px #0ff, inset 0 0 10px #0ff;
            transition: all 0.2s;
        }
        .menu-btn:hover {
            background-color: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff, inset 0 0 20px #0ff;
        }
        #end-screen {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(20, 0, 0, 0.95);
            color: #ff0000;
            font-size: 8vw;
            font-weight: bold;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 30;
            text-shadow: 0 0 30px #ff0000;
            letter-spacing: 5px;
            pointer-events: none;
        }
        h1 { font-size: 64px; margin: 0 0 10px 0; text-shadow: 0 0 20px #0ff; }
        p { font-size: 20px; margin: 5px 0; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body oncontextmenu="return false;">
    <div id="ui">BOTS LEFT: <span id="bots-left">0</span><br><span style="font-size: 16px; color:#aaa" id="weapon-info">WEAPON: PISTOL</span></div>
    <div id="crosshair"></div>
    <canvas id="minimap"></canvas>
    <div id="end-screen">
        <div id="end-title">YOU DIED</div>
        <div id="end-msg" style="font-size: 2vw; color: #aaa; margin-top: 20px; text-shadow: none;">SYSTEM REBOOTING...</div>
    </div>
    <div id="instructions">
        <h1>LASER TAG</h1>
        <p>ELIMINATE ALL TARGETS</p>
        <div class="diff-btns">
            <button class="menu-btn" id="btn-easy">EASY (25)</button>
            <button class="menu-btn" id="btn-medium">MEDIUM (35)</button>
            <button class="menu-btn" id="btn-hard">HARD (50)</button>
        </div>
        <p style="color: #888; margin-top: 30px;">WASD - Move | SHIFT - Sprint | Mouse - Look | Click - Shoot</p>
    </div>

    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020202, 0.015); 
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0); 
        scene.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x111111)); 
        const playerLight = new THREE.PointLight(0x00ffff, 0.8, 20); 
        scene.add(playerLight);

        // УВЕЛИЧЕННАЯ АРЕНА (150x150)
        const arenaSize = 150;
        const gridHelper = new THREE.GridHelper(arenaSize, 75, 0x00ffff, 0x002222);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        const wallBoxes = []; 
        const collidableMeshes = [];

        const wallMat = new THREE.MeshPhongMaterial({ color: 0x080808, shininess: 5 }); 
        const neonCyanMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const neonPurpleMat = new THREE.MeshBasicMaterial({ color: 0xff00ff });

        function createWallBlock(x, z, width, depth) {
            const height = 8;
            const wallGeo = new THREE.BoxGeometry(width, height, depth);
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set(x, height / 2, z);
            scene.add(wall);
            collidableMeshes.push(wall); 

            wall.updateMatrixWorld();
            const box = new THREE.Box3().setFromObject(wall);
            wallBoxes.push(box);

            const topGeo = new THREE.BoxGeometry(width, 0.1, depth);
            const isCyan = Math.random() > 0.5;
            const top = new THREE.Mesh(topGeo, isCyan ? neonCyanMat : neonPurpleMat);
            top.position.set(x, height + 0.05, z);
            scene.add(top);
        }

        // ВНЕШНИЕ БАРЬЕРЫ
        createWallBlock(0, -arenaSize/2, arenaSize, 2); 
        createWallBlock(0, arenaSize/2, arenaSize, 2);  
        createWallBlock(-arenaSize/2, 0, 2, arenaSize); 
        createWallBlock(arenaSize/2, 0, 2, arenaSize);  

        // ГУСТОЙ, НО 100% ПРОХОДИМЫЙ ЛАБИРИНТ (Решение проблемы со скриншота image_297137.png)
        const gridSpacing = 14; 
        const halfSize = arenaSize / 2;

        for (let x = -halfSize + 15; x < halfSize - 15; x += gridSpacing) {
            for (let z = -halfSize + 15; z < halfSize - 15; z += gridSpacing) {
                // Большая безопасная зона в центре под спавн игрока
                if (Math.abs(x) < 22 && Math.abs(z) < 22) continue;
                
                if (Math.random() > 0.35) {
                    // Размеры строго ограничены, чтобы коридоры всегда оставались широкими и сквозными
                    const w = 5 + Math.random() * 5;
                    const d = 5 + Math.random() * 5;
                    const offsetX = (Math.random() - 0.5) * 3;
                    const offsetZ = (Math.random() - 0.5) * 3;
                    
                    createWallBlock(x + offsetX, z + offsetZ, w, d);
                }
            }
        }

        // СИСТЕМА ОРУЖИЯ
        let currentWeapon = 'normal'; 
        let unlocked = { dual: false, mega: false };

        const normalGunMat = new THREE.MeshPhongMaterial({color: 0x222222, emissive: 0x003333});
        const megaGunMat = new THREE.MeshPhongMaterial({color: 0x111111, emissive: 0x330000});
        
        const gunRight = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.6), normalGunMat);
        gunRight.position.set(0.3, -0.3, -0.6);
        
        const gunLeft = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.6), normalGunMat);
        gunLeft.position.set(-0.3, -0.3, -0.6);

        const megaGun = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 1.0), megaGunMat);
        megaGun.position.set(0, -0.4, -0.8);

        function updateWeaponVis() {
            camera.remove(gunRight, gunLeft, megaGun);
            if (currentWeapon === 'normal') {
                camera.add(gunRight);
                document.getElementById('weapon-info').innerText = "WEAPON: PISTOL";
            }
            if (currentWeapon === 'dual') {
                camera.add(gunRight);
                camera.add(gunLeft);
                document.getElementById('weapon-info').innerText = "WEAPON: DUAL WIELD";
            }
            if (currentWeapon === 'mega') {
                camera.add(megaGun);
                document.getElementById('weapon-info').innerText = "WEAPON: MEGA GUN (AUTO)";
            }
        }
        updateWeaponVis();

        // СОСТОЯНИЕ ИГРЫ
        let initialSettings = { bots: 25, speed: 2.0 }; 
        let maxBots = 25, bots = [], isGameActive = false;

        const botsLeftUI = document.getElementById('bots-left');
        const endScreen = document.getElementById('end-screen');
        const endTitle = document.getElementById('end-title');
        const endMsg = document.getElementById('end-msg');
        const instructions = document.getElementById('instructions');
        
        // ХОЛСТ РАДАРА
        const minimapCanvas = document.getElementById('minimap');
        const mapCtx = minimapCanvas.getContext('2d');
        const mapSize = 200;
        minimapCanvas.width = mapSize;
        minimapCanvas.height = mapSize;

        const botBodyMat = new THREE.MeshPhongMaterial({ color: 0xff0000, emissive: 0x550000, shininess: 50 });
        const botBodyGeo = new THREE.CylinderGeometry(0.6, 0.6, 1.4, 16);
        const botHeadGeo = new THREE.SphereGeometry(0.6, 16, 16);
        const visorGeo = new THREE.BoxGeometry(0.7, 0.25, 0.5);
        const visorMat = new THREE.MeshBasicMaterial({ color: 0xdddddd });

        function createBot() {
            const botGroup = new THREE.Group();
            botGroup.isBot = true; 
            
            const body = new THREE.Mesh(botBodyGeo, botBodyMat);
            body.position.y = 0.7; 
            const head = new THREE.Mesh(botHeadGeo, botBodyMat);
            head.position.y = 1.4; 
            const bottom = new THREE.Mesh(botHeadGeo, botBodyMat);
            bottom.position.y = 0.7; 
            const visor = new THREE.Mesh(visorGeo, visorMat);
            visor.position.set(0, 1.2, 0.45); 
            
            botGroup.add(body, head, bottom, visor);

            let validPosition = false;
            let bx, bz, attempts = 0;
            
            while(!validPosition && attempts < 150) {
                bx = (Math.random() - 0.5) * (arenaSize - 6);
                bz = (Math.random() - 0.5) * (arenaSize - 6);
                
                let box = new THREE.Box3(new THREE.Vector3(bx-1.5, 0, bz-1.5), new THREE.Vector3(bx+1.5, 2, bz+1.5));
                let inWall = wallBoxes.some(w => w.intersectsBox(box));
                let distToPlayer = Math.hypot(camera.position.x - bx, camera.position.z - bz);
                
                if (!inWall && distToPlayer > 22) validPosition = true;
                attempts++;
            }

            if(validPosition) {
                botGroup.position.set(bx, 0, bz);
                scene.add(botGroup);
                bots.push(botGroup);
            }
        }

        function startGame(diffBots, diffSpeed) {
            initialSettings.bots = diffBots;
            initialSettings.speed = diffSpeed;
            maxBots = diffBots;
            isGameActive = true;
            
            if (unlocked.mega) currentWeapon = 'mega';
            else if (unlocked.dual) currentWeapon = 'dual';
            else currentWeapon = 'normal';
            updateWeaponVis();

            bots.forEach(b => scene.remove(b));
            bots = [];
            for(let i=0; i<maxBots; i++) createBot();
            
            botsLeftUI.innerText = bots.length;
            document.body.requestPointerLock();
        }

        document.getElementById('btn-easy').addEventListener('click', () => startGame(25, 2.0));
        document.getElementById('btn-medium').addEventListener('click', () => startGame(35, 2.5));
        document.getElementById('btn-hard').addEventListener('click', () => startGame(50, 3.0));

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                instructions.style.display = 'none';
            } else if (isGameActive) {
                instructions.style.display = 'flex';
            }
        });

        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        document.addEventListener('mousemove', (event) => {
            if (document.pointerLockElement === document.body) {
                euler.setFromQuaternion(camera.quaternion);
                euler.y -= event.movementX * 0.002;
                euler.x -= event.movementY * 0.002;
                euler.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, euler.x));
                camera.quaternion.setFromEuler(euler);
            }
        });

        // КЛИКИ И УПРАВЛЕНИЕ (ДОБАВЛЕН SHIFT)
        const keys = { w: false, a: false, s: false, d: false, shift: false };
        document.addEventListener('keydown', (e) => { 
            if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; 
            if (e.key === 'Shift') keys.shift = true;
        });
        document.addEventListener('keyup', (e) => { 
            if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; 
            if (e.key === 'Shift') keys.shift = false;
        });

        let mouseL = false, mouseR = false;
        document.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== document.body || !isGameActive) return;
            if (e.button === 0) mouseL = true;
            if (e.button === 2) mouseR = true;

            if (currentWeapon === 'normal' && e.button === 0) fireRaycast('right');
            if (currentWeapon === 'dual') {
                if (e.button === 0) fireRaycast('right'); 
                if (e.button === 2) fireRaycast('left');  
            }
        });
        document.addEventListener('mouseup', (e) => {
            if (e.button === 0) mouseL = false;
            if (e.button === 2) mouseR = false;
        });

        const raycaster = new THREE.Raycaster();
        
        function fireRaycast(originStr) {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            let targets = [...collidableMeshes];
            bots.forEach(b => targets.push(...b.children));
            
            const intersects = raycaster.intersectObjects(targets);
            let endPoint = raycaster.ray.at(150, new THREE.Vector3());

            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                endPoint = intersects[0].point; 
                const parentGroup = hitMesh.parent;
                
                if (parentGroup && parentGroup.isBot) {
                    scene.remove(parentGroup);
                    bots = bots.filter(b => b !== parentGroup);
                    botsLeftUI.innerText = bots.length;

                    if (bots.length === 0) handleWin();
                }
            }

            const offset = new THREE.Vector3();
            if (originStr === 'right') offset.set(0.3, -0.3, -0.6);
            if (originStr === 'left') offset.set(-0.3, -0.3, -0.6);
            if (originStr === 'center') offset.set(0, -0.4, -0.8);
            
            offset.applyQuaternion(camera.quaternion);
            const startPoint = camera.position.clone().add(offset);
            
            const lineMat = new THREE.LineBasicMaterial({ color: originStr === 'center' ? 0xff0000 : 0x00ffff });
            const laserGeo = new THREE.BufferGeometry().setFromPoints([startPoint, endPoint]);
            const laser = new THREE.Line(laserGeo, lineMat);
            scene.add(laser);
            setTimeout(() => scene.remove(laser), 50);

            let activeGun = originStr === 'right' ? gunRight : (originStr === 'left' ? gunLeft : megaGun);
            activeGun.position.z += 0.1;
            setTimeout(() => { activeGun.position.z -= 0.1; }, 50);
        }

        function handleWin() {
            isGameActive = false;
            document.exitPointerLock();
            endScreen.style.background = 'rgba(0, 20, 0, 0.95)';
            endScreen.style.color = '#00ff00';
            endTitle.innerText = "VICTORY";
            endTitle.style.textShadow = '0 0 30px #00ff00';
            
            let unlockMsg = "MISSION ACCOMPLISHED";
            if (initialSettings.bots === 35 && !unlocked.dual) {
                unlocked.dual = true;
                unlockMsg = "UNLOCKED: DUAL WIELD PISTOLS";
            } else if (initialSettings.bots === 50 && !unlocked.mega) {
                unlocked.mega = true;
                unlockMsg = "UNLOCKED: MEGA GUN (RATATATA!)";
            }

            endMsg.innerText = unlockMsg;
            endMsg.style.color = '#ff0';
            endScreen.style.display = 'flex';
            
            setTimeout(resetGameUI, 4000);
        }

        function triggerDeath() {
            isGameActive = false;
            document.exitPointerLock();
            endScreen.style.background = 'rgba(20, 0, 0, 0.95)';
            endScreen.style.color = '#ff0000';
            endTitle.innerText = "YOU DIED";
            endTitle.style.textShadow = '0 0 30px #ff0000';
            endMsg.innerText = "SYSTEM REBOOTING...";
            endMsg.style.color = '#aaa';
            endScreen.style.display = 'flex';
            
            setTimeout(resetGameUI, 3000);
        }

        function resetGameUI() {
            bots.forEach(b => scene.remove(b));
            bots = [];
            botsLeftUI.innerText = "0";
            camera.position.set(0, 1.6, 0); 
            euler.set(0,0,0);
            camera.quaternion.setFromEuler(euler);
            endScreen.style.display = 'none';
            instructions.style.display = 'flex';
        }

        function checkCollision(px, pz, radius = 0.4) {
            const box = new THREE.Box3(
                new THREE.Vector3(px - radius, 0, pz - radius),
                new THREE.Vector3(px + radius, 1.8, pz + radius)
            );
            return wallBoxes.some(w => w.intersectsBox(box));
        }

        // ОБНОВЛЕННАЯ ТАКТИЧЕСКАЯ ВРАЩАЮЩАЯСЯ МИНИКАРТА
        function updateMinimap() {
            mapCtx.clearRect(0, 0, mapSize, mapSize);
            
            const viewRadius = 45; // Радиус обзора радара в игровых метрах вокруг игрока
            const scale = mapSize / (viewRadius * 2);
            
            mapCtx.save();
            // Сдвигаем холст в центр круга
            mapCtx.translate(mapSize / 2, mapSize / 2);
            // Вращаем карту ПРОТИВ направления взгляда игрока (euler.y)
            mapCtx.rotate(euler.y); 
            // Применяем масштаб и сдвигаем систему координат на позицию игрока
            mapCtx.scale(scale, scale);
            mapCtx.translate(-camera.position.x, -camera.position.z);
            
            // Рисуем стены в мировых координатах
            mapCtx.fillStyle = '#002525';
            wallBoxes.forEach(box => {
                const w = box.max.x - box.min.x;
                const h = box.max.z - box.min.z;
                mapCtx.fillRect(box.min.x, box.min.z, w, h);
            });

            // Рисуем ботов в мировых координатах
            mapCtx.fillStyle = '#ff0000';
            bots.forEach(bot => {
                mapCtx.beginPath();
                mapCtx.arc(bot.position.x, bot.position.z, 1.4, 0, Math.PI * 2);
                mapCtx.fill();
            });
            
            mapCtx.restore();

            // Игрок ВСЕГДА жестко в центре радара и смотрит строго ВВЕРХ (стрелочка направления)
            mapCtx.fillStyle = '#00ffff';
            mapCtx.beginPath();
            mapCtx.moveTo(mapSize / 2, mapSize / 2 - 8);   // Нос стрелки
            mapCtx.lineTo(mapSize / 2 - 5, mapSize / 2 + 5); // Левое крыло
            mapCtx.lineTo(mapSize / 2 + 5, mapSize / 2 + 5); // Правое крыло
            mapCtx.closePath();
            mapCtx.fill();
        }

        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let lastTime = performance.now();
        let lastAutoFireTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = Math.min((time - lastTime) / 1000, 0.1); 
            lastTime = time;

            if (document.pointerLockElement === document.body && isGameActive) {
                playerLight.position.set(camera.position.x, camera.position.y, camera.position.z);

                // АВТОМАТ ДЛЯ MEGA GUN
                if (currentWeapon === 'mega' && mouseL && (time - lastAutoFireTime) > 90) {
                    fireRaycast('center');
                    lastAutoFireTime = time;
                }

                // ДВИЖЕНИЕ ИГРОКА С УЧЕТОМ СУПЕР-СПРИНТА (SHIFT)
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(keys.w) - Number(keys.s); 
                direction.x = Number(keys.d) - Number(keys.a); 
                direction.normalize();

                // Базовая скорость 70, на шифте — 105 (быстрее ровно на 0.5х от базы)
                const speed = keys.shift ? 105.0 : 70.0;
                
                if (keys.w || keys.s) velocity.z -= direction.z * speed * delta; 
                if (keys.a || keys.d) velocity.x += direction.x * speed * delta; 

                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                forward.y = 0; forward.normalize();
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                right.y = 0; right.normalize();

                const moveX = (right.x * velocity.x - forward.x * velocity.z) * delta;
                const moveZ = (right.z * velocity.x - forward.z * velocity.z) * delta;

                if (!checkCollision(camera.position.x + moveX, camera.position.z)) camera.position.x += moveX;
                else velocity.x = 0;

                if (!checkCollision(camera.position.x, camera.position.z + moveZ)) camera.position.z += moveZ;
                else velocity.z = 0;

                camera.position.y = 1.6;

                // ЛОГИКА БОТОВ
                const playerPos2D = new THREE.Vector3(camera.position.x, 0, camera.position.z);
                
                bots.forEach(bot => {
                    const botPos2D = new THREE.Vector3(bot.position.x, 0, bot.position.z);
                    const distance = playerPos2D.distanceTo(botPos2D);

                    if (distance < 1.2) {
                        triggerDeath();
                    } else {
                        const separation = new THREE.Vector3();
                        let count = 0;
                        
                        bots.forEach(otherBot => {
                            if (bot !== otherBot) {
                                const otherPos = new THREE.Vector3(otherBot.position.x, 0, otherBot.position.z);
                                if (botPos2D.distanceTo(otherPos) < 2.2) { 
                                    separation.add(new THREE.Vector3().subVectors(botPos2D, otherPos).normalize());
                                    count++;
                                }
                            }
                        });

                        if (count > 0) separation.divideScalar(count).multiplyScalar(2.0); 

                        const dirToPlayer = new THREE.Vector3().subVectors(playerPos2D, botPos2D).normalize();
                        const currentSpeed = initialSettings.speed + (Math.random() * 0.4);
                        
                        const finalMove = new THREE.Vector3()
                            .copy(dirToPlayer)
                            .multiplyScalar(currentSpeed * delta)
                            .add(separation.multiplyScalar(delta));

                        const nextX = bot.position.x + finalMove.x;
                        const nextZ = bot.position.z + finalMove.z;

                        if (!checkCollision(nextX, bot.position.z, 0.6)) bot.position.x = nextX;
                        if (!checkCollision(bot.position.x, nextZ, 0.6)) bot.position.z = nextZ;

                        bot.lookAt(playerPos2D);
                    }
                });

                // Обновляем радар
                updateMinimap();
            }

            renderer.render(scene, camera);
        }
        
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
