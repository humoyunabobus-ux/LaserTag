<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Laser Tag - Tactical Radar Update</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #020202; 
            font-family: 'Courier New', Courier, monospace; 
            user-select: none;
        }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: #0ff; 
            font-size: 28px; 
            font-weight: bold;
            text-shadow: 0 0 10px #0ff; 
            z-index: 10; 
            pointer-events: none;
        }
        #crosshair { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            width: 20px; 
            height: 20px; 
            border: 3px solid #0ff; 
            border-radius: 50%; 
            transform: translate(-50%, -50%); 
            pointer-events: none; 
            box-shadow: 0 0 10px #0ff, inset 0 0 5px #0ff; 
            z-index: 10;
        }
        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 4px; height: 4px;
            background: #0ff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            background: rgba(0, 15, 15, 0.85);
            border: 2px solid #0ff;
            border-radius: 50%;
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }
        #instructions { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: rgba(0, 0, 0, 0.9); 
            color: #0ff; 
            z-index: 20; 
        }
        /* Обновленная сетка для кнопок */
        .diff-btns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
            max-width: 900px;
        }
        .menu-btn {
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            background-color: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            border-radius: 5px;
            cursor: pointer;
            text-shadow: 0 0 10px #0ff;
            box-shadow: 0 0 10px #0ff, inset 0 0 10px #0ff;
            transition: all 0.2s;
        }
        .menu-btn:hover {
            background-color: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff, inset 0 0 20px #0ff;
        }
        /* Специфичные цвета для новых уровней */
        #btn-mega { color: #f0f; border-color: #f0f; text-shadow: 0 0 10px #f0f; box-shadow: 0 0 10px #f0f, inset 0 0 10px #f0f; }
        #btn-mega:hover { background-color: #f0f; color: #000; box-shadow: 0 0 20px #f0f, inset 0 0 20px #f0f; }
        
        #btn-devil { color: #f00; border-color: #f00; text-shadow: 0 0 10px #f00; box-shadow: 0 0 10px #f00, inset 0 0 10px #f00; }
        #btn-devil:hover { background-color: #f00; color: #000; box-shadow: 0 0 20px #f00, inset 0 0 20px #f00; }
        
        #btn-dont { color: #500; border-color: #500; text-shadow: 0 0 10px #500; box-shadow: 0 0 10px #500, inset 0 0 10px #500; }
        #btn-dont:hover { background-color: #500; color: #fff; box-shadow: 0 0 20px #500, inset 0 0 20px #500; }

        #end-screen {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(20, 0, 0, 0.95);
            color: #ff0000;
            font-size: 8vw;
            font-weight: bold;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 30;
            text-shadow: 0 0 30px #ff0000;
            letter-spacing: 5px;
            pointer-events: none;
        }
        h1 { font-size: 64px; margin: 0 0 10px 0; text-shadow: 0 0 20px #0ff; }
        p { font-size: 20px; margin: 5px 0; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body oncontextmenu="return false;">
    <div id="ui">BOTS LEFT: <span id="bots-left">0</span><br><span style="font-size: 16px; color:#aaa" id="weapon-info">WEAPON: PISTOL</span></div>
    <div id="crosshair"></div>
    <canvas id="minimap"></canvas>
    <div id="end-screen">
        <div id="end-title">YOU DIED</div>
        <div id="end-msg" style="font-size: 2vw; color: #aaa; margin-top: 20px; text-shadow: none;">SYSTEM REBOOTING...</div>
    </div>
    <div id="instructions">
        <h1>LASER TAG</h1>
        <p>ELIMINATE ALL TARGETS</p>
        <div class="diff-btns">
            <button class="menu-btn" id="btn-easy">EASY (25)</button>
            <button class="menu-btn" id="btn-medium">MEDIUM (35)</button>
            <button class="menu-btn" id="btn-hard">HARD (50)</button>
            <button class="menu-btn" id="btn-mega">MEGA HARD (70)</button>
            <button class="menu-btn" id="btn-devil">DEVIL (100)</button>
            <button class="menu-btn" id="btn-dont">DONT TRY THIS ONE (150)</button>
        </div>
        <p style="color: #888; margin-top: 30px;">WASD - Move | SHIFT - Sprint | Mouse - Look | Click - Shoot</p>
    </div>

    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020202, 0.015); 
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0); 
        scene.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x111111)); 
        const playerLight = new THREE.PointLight(0x00ffff, 0.8, 20); 
        scene.add(playerLight);

        // --- ДИНАМИЧЕСКАЯ АРЕНА ---
        let baseArenaSize = 150;
        let currentArenaSize = 150;
        let wallBoxes = []; 
        let collidableMeshes = [];
        let arenaObjects = []; // Для очистки при перегенерации

        const wallMat = new THREE.MeshPhongMaterial({ color: 0x080808, shininess: 5 }); 
        const neonCyanMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const neonPurpleMat = new THREE.MeshBasicMaterial({ color: 0xff00ff });

        function clearArena() {
            arenaObjects.forEach(obj => scene.remove(obj));
            arenaObjects = [];
            wallBoxes = [];
            collidableMeshes = [];
        }

        function createWallBlock(x, z, width, depth) {
            const height = 8;
            const wallGeo = new THREE.BoxGeometry(width, height, depth);
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set(x, height / 2, z);
            scene.add(wall);
            collidableMeshes.push(wall); 
            arenaObjects.push(wall);

            wall.updateMatrixWorld();
            const box = new THREE.Box3().setFromObject(wall);
            wallBoxes.push(box);

            const topGeo = new THREE.BoxGeometry(width, 0.1, depth);
            const isCyan = Math.random() > 0.5;
            const top = new THREE.Mesh(topGeo, isCyan ? neonCyanMat : neonPurpleMat);
            top.position.set(x, height + 0.05, z);
            scene.add(top);
            arenaObjects.push(top);
        }

        function buildArena(multiplier) {
            clearArena();
            currentArenaSize = baseArenaSize * multiplier;
            
            // Настройка тумана под размер
            scene.fog.density = 0.015 / multiplier;

            const gridHelper = new THREE.GridHelper(currentArenaSize, Math.floor(currentArenaSize/2), 0x00ffff, 0x002222);
            gridHelper.position.y = 0;
            scene.add(gridHelper);
            arenaObjects.push(gridHelper);

            // ВНЕШНИЕ БАРЬЕРЫ
            createWallBlock(0, -currentArenaSize/2, currentArenaSize, 2); 
            createWallBlock(0, currentArenaSize/2, currentArenaSize, 2);  
            createWallBlock(-currentArenaSize/2, 0, 2, currentArenaSize); 
            createWallBlock(currentArenaSize/2, 0, 2, currentArenaSize);  

            // ЛАБИРИНТ
            const gridSpacing = 14; 
            const halfSize = currentArenaSize / 2;

            for (let x = -halfSize + 15; x < halfSize - 15; x += gridSpacing) {
                for (let z = -halfSize + 15; z < halfSize - 15; z += gridSpacing) {
                    if (Math.abs(x) < 22 && Math.abs(z) < 22) continue; // Безопасная зона в центре
                    
                    if (Math.random() > 0.35) {
                        const w = 5 + Math.random() * 5;
                        const d = 5 + Math.random() * 5;
                        const offsetX = (Math.random() - 0.5) * 3;
                        const offsetZ = (Math.random() - 0.5) * 3;
                        createWallBlock(x + offsetX, z + offsetZ, w, d);
                    }
                }
            }
        }

        // --- СИСТЕМА ОРУЖИЯ ---
        let currentWeapon = 'normal'; 
        let unlocked = { dual: false, mega: false, dual_mega: false, bazooka: false };

        const normalGunMat = new THREE.MeshPhongMaterial({color: 0x222222, emissive: 0x003333});
        const megaGunMat = new THREE.MeshPhongMaterial({color: 0x111111, emissive: 0x330000});
        const bazookaMat = new THREE.MeshPhongMaterial({color: 0x223311, emissive: 0x112200});
        
        // Обычные пистолеты
        const gunRight = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.6), normalGunMat);
        gunRight.position.set(0.3, -0.3, -0.6);
        const gunLeft = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.6), normalGunMat);
        gunLeft.position.set(-0.3, -0.3, -0.6);

        // Mega Gun
        const megaGun = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 1.0), megaGunMat);
        megaGun.position.set(0, -0.4, -0.8);

        // Dual Mega
        const megaRight = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 1.0), megaGunMat);
        megaRight.position.set(0.4, -0.4, -0.8);
        const megaLeft = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 1.0), megaGunMat);
        megaLeft.position.set(-0.4, -0.4, -0.8);

        // Bazooka
        const bazooka = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, 1.5, 16), bazookaMat);
        bazooka.rotation.x = Math.PI / 2;
        bazooka.position.set(0.3, -0.4, -0.8);

        function updateWeaponVis() {
            camera.remove(gunRight, gunLeft, megaGun, megaRight, megaLeft, bazooka);
            let infoText = "WEAPON: PISTOL";

            if (currentWeapon === 'normal') { camera.add(gunRight); }
            if (currentWeapon === 'dual') { camera.add(gunRight); camera.add(gunLeft); infoText = "WEAPON: DUAL WIELD"; }
            if (currentWeapon === 'mega') { camera.add(megaGun); infoText = "WEAPON: MEGA GUN (AUTO)"; }
            if (currentWeapon === 'dual_mega') { camera.add(megaRight); camera.add(megaLeft); infoText = "WEAPON: DUAL MEGA (AUTO)"; }
            if (currentWeapon === 'bazooka') { camera.add(bazooka); infoText = "WEAPON: BAZOOKA (AREA DMG)"; }

            document.getElementById('weapon-info').innerText = infoText;
        }

        // --- СОСТОЯНИЕ ИГРЫ ---
        let initialSettings = { bots: 25, speed: 2.0, arenaMult: 1.0 }; 
        let maxBots = 25, bots = [], isGameActive = false;

        const botsLeftUI = document.getElementById('bots-left');
        const endScreen = document.getElementById('end-screen');
        const endTitle = document.getElementById('end-title');
        const endMsg = document.getElementById('end-msg');
        const instructions = document.getElementById('instructions');
        
        // ХОЛСТ РАДАРА
        const minimapCanvas = document.getElementById('minimap');
        const mapCtx = minimapCanvas.getContext('2d');
        const mapSize = 200;
        minimapCanvas.width = mapSize;
        minimapCanvas.height = mapSize;

        const botBodyMat = new THREE.MeshPhongMaterial({ color: 0xff0000, emissive: 0x550000, shininess: 50 });
        const botBodyGeo = new THREE.CylinderGeometry(0.6, 0.6, 1.4, 16);
        const botHeadGeo = new THREE.SphereGeometry(0.6, 16, 16);
        const visorGeo = new THREE.BoxGeometry(0.7, 0.25, 0.5);
        const visorMat = new THREE.MeshBasicMaterial({ color: 0xdddddd });

        function createBot() {
            const botGroup = new THREE.Group();
            botGroup.isBot = true; 
            
            const body = new THREE.Mesh(botBodyGeo, botBodyMat);
            body.position.y = 0.7; 
            const head = new THREE.Mesh(botHeadGeo, botBodyMat);
            head.position.y = 1.4; 
            const bottom = new THREE.Mesh(botHeadGeo, botBodyMat);
            bottom.position.y = 0.7; 
            const visor = new THREE.Mesh(visorGeo, visorMat);
            visor.position.set(0, 1.2, 0.45); 
            
            botGroup.add(body, head, bottom, visor);

            let validPosition = false;
            let bx, bz, attempts = 0;
            
            while(!validPosition && attempts < 150) {
                bx = (Math.random() - 0.5) * (currentArenaSize - 6);
                bz = (Math.random() - 0.5) * (currentArenaSize - 6);
                
                let box = new THREE.Box3(new THREE.Vector3(bx-1.5, 0, bz-1.5), new THREE.Vector3(bx+1.5, 2, bz+1.5));
                let inWall = wallBoxes.some(w => w.intersectsBox(box));
                let distToPlayer = Math.hypot(camera.position.x - bx, camera.position.z - bz);
                
                if (!inWall && distToPlayer > 22) validPosition = true;
                attempts++;
            }

            if(validPosition) {
                botGroup.position.set(bx, 0, bz);
                scene.add(botGroup);
                bots.push(botGroup);
            }
        }

        function startGame(diffBots, diffSpeed, arenaMult) {
            initialSettings.bots = diffBots;
            initialSettings.speed = diffSpeed;
            initialSettings.arenaMult = arenaMult;
            maxBots = diffBots;
            isGameActive = true;
            
            // Выбор лучшего доступного оружия
            if (unlocked.bazooka) currentWeapon = 'bazooka';
            else if (unlocked.dual_mega) currentWeapon = 'dual_mega';
            else if (unlocked.mega) currentWeapon = 'mega';
            else if (unlocked.dual) currentWeapon = 'dual';
            else currentWeapon = 'normal';
            updateWeaponVis();

            // Перестройка арены
            buildArena(arenaMult);

            bots.forEach(b => scene.remove(b));
            bots = [];
            for(let i=0; i<maxBots; i++) createBot();
            
            botsLeftUI.innerText = bots.length;
            document.body.requestPointerLock();
        }

        document.getElementById('btn-easy').addEventListener('click', () => startGame(25, 2.0, 1.0));
        document.getElementById('btn-medium').addEventListener('click', () => startGame(35, 2.5, 1.0));
        document.getElementById('btn-hard').addEventListener('click', () => startGame(50, 3.0, 1.0));
        document.getElementById('btn-mega').addEventListener('click', () => startGame(70, 4.5, 1.5));
        document.getElementById('btn-devil').addEventListener('click', () => startGame(100, 6.0, 2.0));
        document.getElementById('btn-dont').addEventListener('click', () => startGame(150, 6.0, 4.0));

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                instructions.style.display = 'none';
            } else if (isGameActive) {
                instructions.style.display = 'flex';
            }
        });

        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        document.addEventListener('mousemove', (event) => {
            if (document.pointerLockElement === document.body) {
                euler.setFromQuaternion(camera.quaternion);
                euler.y -= event.movementX * 0.002;
                euler.x -= event.movementY * 0.002;
                euler.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, euler.x));
                camera.quaternion.setFromEuler(euler);
            }
        });

        const keys = { w: false, a: false, s: false, d: false, shift: false };
        document.addEventListener('keydown', (e) => { 
            if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; 
            if (e.key === 'Shift') keys.shift = true;
        });
        document.addEventListener('keyup', (e) => { 
            if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; 
            if (e.key === 'Shift') keys.shift = false;
        });

        let mouseL = false, mouseR = false;
        document.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== document.body || !isGameActive) return;
            if (e.button === 0) mouseL = true;
            if (e.button === 2) mouseR = true;

            if (currentWeapon === 'normal' && e.button === 0) fireRaycast('right');
            if (currentWeapon === 'dual') {
                if (e.button === 0) fireRaycast('right'); 
                if (e.button === 2) fireRaycast('left');  
            }
            if (currentWeapon === 'bazooka' && e.button === 0) fireBazooka();
        });
        document.addEventListener('mouseup', (e) => {
            if (e.button === 0) mouseL = false;
            if (e.button === 2) mouseR = false;
        });

        const raycaster = new THREE.Raycaster();
        
        function drawLaser(startOffset, endPoint, colorStr) {
            const offset = new THREE.Vector3().copy(startOffset);
            offset.applyQuaternion(camera.quaternion);
            const startPoint = camera.position.clone().add(offset);
            
            const lineMat = new THREE.LineBasicMaterial({ color: colorStr });
            const laserGeo = new THREE.BufferGeometry().setFromPoints([startPoint, endPoint]);
            const laser = new THREE.Line(laserGeo, lineMat);
            scene.add(laser);
            setTimeout(() => scene.remove(laser), 50);
        }

        function animateGun(gunObj) {
            gunObj.position.z += 0.1;
            setTimeout(() => { gunObj.position.z -= 0.1; }, 50);
        }

        function fireRaycast(originStr) {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            let targets = [...collidableMeshes];
            bots.forEach(b => targets.push(...b.children));
            
            const intersects = raycaster.intersectObjects(targets);
            let endPoint = raycaster.ray.at(150, new THREE.Vector3());

            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                endPoint = intersects[0].point; 
                const parentGroup = hitMesh.parent;
                
                if (parentGroup && parentGroup.isBot) {
                    scene.remove(parentGroup);
                    bots = bots.filter(b => b !== parentGroup);
                    botsLeftUI.innerText = bots.length;
                    if (bots.length === 0) handleWin();
                }
            }

            if (originStr === 'right') { drawLaser(new THREE.Vector3(0.3, -0.3, -0.6), endPoint, 0x00ffff); animateGun(gunRight); }
            if (originStr === 'left') { drawLaser(new THREE.Vector3(-0.3, -0.3, -0.6), endPoint, 0x00ffff); animateGun(gunLeft); }
            if (originStr === 'center') { drawLaser(new THREE.Vector3(0, -0.4, -0.8), endPoint, 0xff0000); animateGun(megaGun); }
            if (originStr === 'megaR') { drawLaser(new THREE.Vector3(0.4, -0.4, -0.8), endPoint, 0xff00ff); animateGun(megaRight); }
            if (originStr === 'megaL') { drawLaser(new THREE.Vector3(-0.4, -0.4, -0.8), endPoint, 0xff00ff); animateGun(megaLeft); }
        }

        function fireBazooka() {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            let targets = [...collidableMeshes];
            bots.forEach(b => targets.push(...b.children));
            
            const intersects = raycaster.intersectObjects(targets);
            let endPoint = raycaster.ray.at(150, new THREE.Vector3());
            if (intersects.length > 0) endPoint = intersects[0].point;

            // Визуализация ракеты
            drawLaser(new THREE.Vector3(0.3, -0.4, -0.8), endPoint, 0xffff00);
            animateGun(bazooka);

            // Эффект взрыва
            const explosionGeo = new THREE.SphereGeometry(12, 16, 16);
            const explosionMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.8 });
            const explosion = new THREE.Mesh(explosionGeo, explosionMat);
            explosion.position.copy(endPoint);
            scene.add(explosion);

            let scale = 1.0;
            const explodeAnim = setInterval(() => {
                scale += 0.2;
                explosion.scale.set(scale, scale, scale);
                explosion.material.opacity -= 0.1;
                if (explosion.material.opacity <= 0) {
                    scene.remove(explosion);
                    clearInterval(explodeAnim);
                }
            }, 30);

            // Урон по площади
            let botsToKill = [];
            bots.forEach(bot => {
                if (bot.position.distanceTo(endPoint) <= 15) botsToKill.push(bot);
            });

            botsToKill.forEach(bot => {
                scene.remove(bot);
                bots = bots.filter(b => b !== bot);
            });
            botsLeftUI.innerText = bots.length;
            if (bots.length === 0) handleWin();
        }

        function handleWin() {
            isGameActive = false;
            document.exitPointerLock();
            endScreen.style.background = 'rgba(0, 20, 0, 0.95)';
            endScreen.style.color = '#00ff00';
            endTitle.innerText = "VICTORY";
            endTitle.style.textShadow = '0 0 30px #00ff00';
            
            let unlockMsg = "MISSION ACCOMPLISHED";
            if (initialSettings.bots === 35 && !unlocked.dual) {
                unlocked.dual = true; unlockMsg = "UNLOCKED: DUAL WIELD PISTOLS";
            } else if (initialSettings.bots === 50 && !unlocked.mega) {
                unlocked.mega = true; unlockMsg = "UNLOCKED: MEGA GUN (RATATATA!)";
            } else if (initialSettings.bots === 70 && !unlocked.dual_mega) {
                unlocked.dual_mega = true; unlockMsg = "UNLOCKED: DOUBLE RATATATA!";
            } else if (initialSettings.bots === 100 && !unlocked.bazooka) {
                unlocked.bazooka = true; unlockMsg = "UNLOCKED: THE BAZOOKA";
            } else if (initialSettings.bots === 150) {
                unlockMsg = "YOU SURVIVED THE IMPOSSIBLE!";
            }

            endMsg.innerText = unlockMsg;
            endMsg.style.color = '#ff0';
            endScreen.style.display = 'flex';
            
            setTimeout(resetGameUI, 4000);
        }

        function triggerDeath() {
            isGameActive = false;
            document.exitPointerLock();
            endScreen.style.background = 'rgba(20, 0, 0, 0.95)';
            endScreen.style.color = '#ff0000';
            endTitle.innerText = "YOU DIED";
            endTitle.style.textShadow = '0 0 30px #ff0000';
            endMsg.innerText = "SYSTEM REBOOTING...";
            endMsg.style.color = '#aaa';
            endScreen.style.display = 'flex';
            
            setTimeout(resetGameUI, 3000);
        }

        function resetGameUI() {
            bots.forEach(b => scene.remove(b));
            bots = [];
            botsLeftUI.innerText = "0";
            camera.position.set(0, 1.6, 0); 
            euler.set(0,0,0);
            camera.quaternion.setFromEuler(euler);
            endScreen.style.display = 'none';
            instructions.style.display = 'flex';
        }

        function checkCollision(px, pz, radius = 0.4) {
            const box = new THREE.Box3(
                new THREE.Vector3(px - radius, 0, pz - radius),
                new THREE.Vector3(px + radius, 1.8, pz + radius)
            );
            return wallBoxes.some(w => w.intersectsBox(box));
        }

        function updateMinimap() {
            mapCtx.clearRect(0, 0, mapSize, mapSize);
            
            const viewRadius = 45 * initialSettings.arenaMult; // Радар немного отдаляется на больших аренах
            const scale = mapSize / (viewRadius * 2);
            
            mapCtx.save();
            mapCtx.translate(mapSize / 2, mapSize / 2);
            mapCtx.rotate(euler.y); 
            mapCtx.scale(scale, scale);
            mapCtx.translate(-camera.position.x, -camera.position.z);
            
            mapCtx.fillStyle = '#002525';
            wallBoxes.forEach(box => {
                const w = box.max.x - box.min.x;
                const h = box.max.z - box.min.z;
                mapCtx.fillRect(box.min.x, box.min.z, w, h);
            });

            mapCtx.fillStyle = '#ff0000';
            bots.forEach(bot => {
                mapCtx.beginPath();
                mapCtx.arc(bot.position.x, bot.position.z, 1.4, 0, Math.PI * 2);
                mapCtx.fill();
            });
            
            mapCtx.restore();

            mapCtx.fillStyle = '#00ffff';
            mapCtx.beginPath();
            mapCtx.moveTo(mapSize / 2, mapSize / 2 - 8);   
            mapCtx.lineTo(mapSize / 2 - 5, mapSize / 2 + 5); 
            mapCtx.lineTo(mapSize / 2 + 5, mapSize / 2 + 5); 
            mapCtx.closePath();
            mapCtx.fill();
        }

        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let lastTime = performance.now();
        let lastAutoFireTime = 0;
        let toggleDual = false;

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = Math.min((time - lastTime) / 1000, 0.1); 
            lastTime = time;

            if (document.pointerLockElement === document.body && isGameActive) {
                playerLight.position.set(camera.position.x, camera.position.y, camera.position.z);

                // АВТОМАТ ДЛЯ MEGA GUN и DUAL MEGA
                if ((currentWeapon === 'mega' || currentWeapon === 'dual_mega') && mouseL && (time - lastAutoFireTime) > 90) {
                    if (currentWeapon === 'mega') fireRaycast('center');
                    if (currentWeapon === 'dual_mega') {
                        fireRaycast(toggleDual ? 'megaR' : 'megaL');
                        toggleDual = !toggleDual;
                    }
                    lastAutoFireTime = time;
                }

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(keys.w) - Number(keys.s); 
                direction.x = Number(keys.d) - Number(keys.a); 
                direction.normalize();

                const speed = keys.shift ? 105.0 : 70.0;
                
                if (keys.w || keys.s) velocity.z -= direction.z * speed * delta; 
                if (keys.a || keys.d) velocity.x += direction.x * speed * delta; 

                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                forward.y = 0; forward.normalize();
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                right.y = 0; right.normalize();

                const moveX = (right.x * velocity.x - forward.x * velocity.z) * delta;
                const moveZ = (right.z * velocity.x - forward.z * velocity.z) * delta;

                if (!checkCollision(camera.position.x + moveX, camera.position.z)) camera.position.x += moveX;
                else velocity.x = 0;

                if (!checkCollision(camera.position.x, camera.position.z + moveZ)) camera.position.z += moveZ;
                else velocity.z = 0;

                camera.position.y = 1.6;

                const playerPos2D = new THREE.Vector3(camera.position.x, 0, camera.position.z);
                
                bots.forEach(bot => {
                    const botPos2D = new THREE.Vector3(bot.position.x, 0, bot.position.z);
                    const distance = playerPos2D.distanceTo(botPos2D);

                    if (distance < 1.2) {
                        triggerDeath();
                    } else {
                        const separation = new THREE.Vector3();
                        let count = 0;
                        
                        bots.forEach(otherBot => {
                            if (bot !== otherBot) {
                                const otherPos = new THREE.Vector3(otherBot.position.x, 0, otherBot.position.z);
                                if (botPos2D.distanceTo(otherPos) < 2.2) { 
                                    separation.add(new THREE.Vector3().subVectors(botPos2D, otherPos).normalize());
                                    count++;
                                }
                            }
                        });

                        if (count > 0) separation.divideScalar(count).multiplyScalar(2.0); 

                        const dirToPlayer = new THREE.Vector3().subVectors(playerPos2D, botPos2D).normalize();
                        const currentSpeed = initialSettings.speed + (Math.random() * 0.4);
                        
                        const finalMove = new THREE.Vector3()
                            .copy(dirToPlayer)
                            .multiplyScalar(currentSpeed * delta)
                            .add(separation.multiplyScalar(delta));

                        const nextX = bot.position.x + finalMove.x;
                        const nextZ = bot.position.z + finalMove.z;

                        if (!checkCollision(nextX, bot.position.z, 0.6)) bot.position.x = nextX;
                        if (!checkCollision(bot.position.x, nextZ, 0.6)) bot.position.z = nextZ;

                        bot.lookAt(playerPos2D);
                    }
                });

                updateMinimap();
            }

            renderer.render(scene, camera);
        }
        
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
